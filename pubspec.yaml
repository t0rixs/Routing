name: routing
description: "Make your life map."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.2
  path: ^1.9.1
  google_maps_flutter: ^2.5.3
  geolocator: ^14.0.1
  cupertino_icons: ^1.0.8
  location: ^8.0.0
  provider: ^6.1.0
  permission_handler: ^12.0.0
  path_provider: ^2.1.5
  flutter_launcher_icons: ^0.13.1
  file_picker: ^10.1.9
  archive: ^3.3.1
  shared_preferences: ^2.0.15
  flutter_svg: ^2.0.10+1
  intl: ^0.18.1
  flutter_background_service: ^5.0.5
  dio: ^5.9.0
  flutter_local_notifications: ^19.5.0
  share_plus: ^10.0.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mapstyle.json
    - assets/UI/
flutter_launcher_icons:
  image_path_android: assets/launcher_icon/android_icon.png
  adaptive_icon_background: "#000000" #iconの背景色
  adaptive_icon_foreground: assets/launcher_icon/android_icon.png
  image_path_ios: assets/launcher_icon/ios_icon.png
  android: true
  adaptive_icon_padding: true
  min_sdk_android: 30 #Androidの最小SDKバージョン
  ios: true
